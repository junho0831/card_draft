spring.application.name=card-draft-server
server.port=8080

spring.datasource.url=${CARD_DRAFT_DB_URL:jdbc:postgresql://localhost:5432/carddraft}
spring.datasource.username=${CARD_DRAFT_DB_USER:carddraft}
spring.datasource.password=${CARD_DRAFT_DB_PASSWORD:carddraft}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.data.redis.host=${CARD_DRAFT_REDIS_HOST:localhost}
spring.data.redis.port=${CARD_DRAFT_REDIS_PORT:6379}

card-draft.cors.allowed-origins=${CARD_DRAFT_CORS_ALLOWED_ORIGINS:*}
