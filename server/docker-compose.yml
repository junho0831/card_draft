services:
  postgres:
    image: postgres:16-alpine
    container_name: card-draft-postgres
    environment:
      POSTGRES_DB: carddraft
      POSTGRES_USER: carddraft
      POSTGRES_PASSWORD: carddraft
    ports:
      - "5432:5432"
    volumes:
      - card-draft-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carddraft -d carddraft"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: card-draft-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  card-draft-postgres:
